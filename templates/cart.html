<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🛒 Your Cart</h1>

<div class="container">
{% for item in items %}
    <div class="card">
        <h2>{{ item[0] }}</h2>
        <p>₹{{ item[1] }}</p>
    </div>
{% endfor %}
</div>

<h2>Total: ₹{{ total }}</h2>

<a href="/"><button>Back to Store</button></a>

</body>
</html>
